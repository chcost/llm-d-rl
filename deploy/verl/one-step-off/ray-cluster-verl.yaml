apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: verl-cluster
  namespace: llm-d-rl
spec:
  rayVersion: '2.47.1'

  headGroupSpec:
    rayStartParams:
      num-cpus: "4"
    template:
      spec:
        affinity: # For node selecting
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                  - pokprod-b93r38s3 # restrict to specific node(s)
        containers:
        - name: ray-head
          image: ghcr.io/naomieisen/verl:vllm-v17
          imagePullPolicy: Always
          lifecycle:
            postStart:
              exec:
                command:
                - /bin/bash
                - -c
                - |
                  exec > /tmp/setup_log.txt 2>&1
                  echo "Starting setup..."

                  # veRL and llmd_verl are already installed in the image.
                  # Just prepare data and prefetch the model.
                  mkdir -p /tmp/verl/hf_cache/datasets

                  # Generate training data
                  python3 /opt/verl/examples/data_preprocess/gsm8k.py --local_save_dir /tmp/verl/data/gsm8k

                  # Pre-fetch model weights
                  python3 -c "import transformers; transformers.pipeline('text-generation', model='Qwen/Qwen2.5-3B-Instruct')"

                  echo "Setup complete" > /tmp/verl_ready.txt
          env:
          # --- llm-d integration ---
          - name: LLMD_CONTROLLER_URL
            value: "http://rollout-controller.llm-d-rl.svc.cluster.local:8090" # update namespace if needed <service>.<namespace>.svc.cluster.local

          # --- WandB ---
          - name: WANDB_API_KEY
            value: "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"

          # --- NCCL diagnostics ---
          - name: NCCL_DEBUG
            value: "INFO"

          # --- veRL / llmd_verl log verbosity (DEBUG / INFO / WARN / ERROR) ---
          - name: VERL_LOGGING_LEVEL
            value: "INFO"

          # --- veRL / Ray settings (keep from working config) ---
          - name: TOKENIZERS_PARALLELISM
            value: "false"
          - name: OMP_NUM_THREADS
            value: "1"
          - name: VLLM_USE_V1
            value: "1"
          - name: RAY_CHEF_MAX_WORKERS
            value: "1"
          - name: VERL_NUM_THREADS
            value: "1"
          - name: RAY_NUM_CPUS_PER_PROCESSER
            value: "1"
          - name: HOME
            value: "/tmp"
          - name: FLASHINFER_WORKSPACE_DIR
            value: "/tmp/flashinfer"
          - name: HF_HOME
            value: "/tmp/verl/hf_cache"
          - name: HF_DATASETS_CACHE
            value: "/tmp/verl/hf_cache/datasets"
          - name: XDG_CACHE_HOME
            value: "/tmp/verl/hf_cache"
          - name: HUGGINGFACE_HUB_CACHE
            value: "/tmp/verl/hf_cache"
          - name: TRITON_CACHE_DIR
            value: "/tmp/triton"
          - name: PYTHONUSERBASE
            value: "/tmp/.local"
          resources:
            limits:
              cpu: "32"
              memory: "96G"
              # No GPU on head — it only runs the driver (fit() loop) and Ray GCS.
              # FSDP training and NCCL broadcast happen on worker pods.
            requests:
              cpu: "24"
              memory: "64G"
          ports:
          - containerPort: 6379
            name: gcs-server
          - containerPort: 8265
            name: dashboard
          - containerPort: 10001
            name: client
          volumeMounts:
          - mountPath: /dev/shm
            name: dshm
          - mountPath: /etc/verl-configs
            name: verl-configs
            readOnly: true
        volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "32Gi"
        - name: verl-configs
          configMap:
            name: verl-configs

  workerGroupSpecs:
  - groupName: fsdp-workers
    replicas: 1
    minReplicas: 1
    maxReplicas: 4
    rayStartParams:
      num-cpus: "32"   # limit Ray's visible CPUs to reduce internal thread spawning
    template:
      spec:
        affinity: # For node selecting
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                  - pokprod-b93r38s3 # restrict to specific node(s) b93r38s3
        containers:
        - name: ray-worker
          image: ghcr.io/naomieisen/verl:vllm-v17
          imagePullPolicy: Always
          lifecycle:
            postStart:
              exec:
                command:
                - /bin/bash
                - -c
                - |
                  exec > /tmp/setup_log.txt 2>&1
                  mkdir -p /tmp/verl/hf_cache/datasets
                  python3 /opt/verl/examples/data_preprocess/gsm8k.py --local_save_dir /tmp/verl/data/gsm8k
                  echo "Setup complete" > /tmp/verl_ready.txt
          env:
          # --- llm-d integration ---
          - name: LLMD_CONTROLLER_URL
            value: "http://rollout-controller.llm-d-rl.svc.cluster.local:8090"

          # --- WandB ---
          - name: WANDB_API_KEY
            value: "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"

          # --- NCCL diagnostics ---
          - name: NCCL_DEBUG
            value: "INFO"

          # --- veRL / llmd_verl log verbosity (DEBUG / INFO / WARN / ERROR) ---
          - name: VERL_LOGGING_LEVEL
            value: "INFO"

          # --- veRL / Ray settings ---
          - name: PYTORCH_CUDA_ALLOC_CONF
            # required when vLLM runs inside the Ray worker (vanilla veRL rollout):
            # CuMemAllocator (used by vLLM sleep/wake) is incompatible with True.
            value: "expandable_segments:False"
          - name: TOKENIZERS_PARALLELISM
            value: "false"
          - name: OMP_NUM_THREADS
            value: "1"
          - name: RAY_max_grpc_threads
            value: "32"
          - name: HOME
            value: "/tmp"
          - name: HF_HOME
            value: "/tmp/verl/hf_cache"
          - name: TRITON_CACHE_DIR
            value: "/tmp/triton"
          - name: PYTHONUSERBASE
            value: "/tmp/.local"
          resources:
            # --- Option A: 8 GPUs ---
            # limits:
            #   cpu: "64"
            #   memory: "256G"
            #   nvidia.com/gpu: "8"
            # requests:
            #   cpu: "32"
            #   memory: "192G"
            #   nvidia.com/gpu: "8"
            # --- Option B: 6 GPUs ---
            limits:
              cpu: "48"
              memory: "192G"
              nvidia.com/gpu: "6"
            requests:
              cpu: "24"
              memory: "144G"
              nvidia.com/gpu: "6"
            # --- Option C: 4 GPUs ---
            # limits:
            #   cpu: "32"
            #   memory: "128G"
            #   nvidia.com/gpu: "4"
            # requests:
            #   cpu: "16"
            #   memory: "96G"
            #   nvidia.com/gpu: "4"
          volumeMounts:
          - mountPath: /dev/shm
            name: dshm
          - mountPath: /etc/verl-configs
            name: verl-configs
            readOnly: true
        volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "64Gi"
        - name: verl-configs
          configMap:
            name: verl-configs